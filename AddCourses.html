<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"  content="width=device-width,initial-scale+1.0"/>
        <title>Add Courses</title>
        <link rel="stylesheet" href="mystyle.css">
    </head>
    <body>
        <header class="nav-bar">
            <div class="logo">Personal Courses Organizer</div>
            <nav class="nav-links">
                <a href="Index.html" title="Home">Home</a>
            <a href=" Mycourses.html" title="courses">MyCourses</a>
            <a href="AddCourses.html" title="Add-Courses">Add Courses</a>
            <a href="ContactUS.html" title="Contact Us">Contact Us</a>
            </nav>
        </header>
        <main class="add-page">
            <div class="form-container">
                <h2>Add New Courses</h2>
                <form>
                    <div class="form-group">
                        <label>Courses Code:</label>
                        <input type="text" placeholder="Example:It">
                    </div>
                    <div class="form-group">
                    <label>Courses Name:</label>
                    <input type="text" placeholder="Enter courses Name">
                    </div>
                    <div class="form-group">
                        <label>Instructor Name:</label>
                        <input type="text" placeholder="Enter instructor name">
                    </div>
                    <div class="form-group">
                        <label>Credit Hours:</label>
                        <input type="numbers" placeholder="Enter credit hours">
                    </div>
                    <div class="form-group">
                        <label> Courses Status:</label>
                        <select class="status-select">
                            <option value="Completed"> Completed</option>
                            <option value="Planned">Planned</option>
                            <option value="In-Progress">In-Progress</option>
                        </select>
                    </div>
                    <button type="Submit" class="View-btn">Save Courses</button>
                </form>
            </div>
        </main>
        <footer class="main-footer">
            <p>&copy; 2026 Courses Organizer . All Rights Reserved . Made By Jana</p>
        </footer>
    </body>

</html>
